name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.2"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm run test:all

      - name: Build
        run: pnpm run build

      - name: Validate docs
        run: pnpm run docs:build

  package-windows:
    name: Package Windows
    needs: verify
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows portable
        run: pnpm run desktop:win:portable

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: layang-windows
          path: |
            dist/make/**/*.zip
          if-no-files-found: error

  package-linux:
    name: Package Linux
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install system packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot dpkg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux packages
        run: pnpm run desktop:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: layang-linux
          path: |
            dist/make/**/*.zip
            dist/make/**/*.deb
            dist/make/**/*.rpm
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - package-windows
      - package-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: Layang ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*
